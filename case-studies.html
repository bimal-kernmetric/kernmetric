  <style>
    /* Editorial card grid specifications */
    .editorial-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-xl);
      margin-bottom: var(--space-xl);
    }
    @media (max-width: 1024px) {
      .editorial-grid {
        grid-template-columns: 1fr;
      }
    }
    .editorial-card {
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: var(--space-lg);
      background-color: var(--bg-primary);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      min-height: 380px;
      transition: border-color var(--transition-smooth);
      box-shadow: none !important;
      background-image: none !important;
    }
    .editorial-card:hover {
      border-color: var(--primary);
    }
    /* Horizontal toolbar row */
    .toolbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-md);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: var(--space-sm);
      margin-bottom: var(--space-xl);
    }
    @media (max-width: 768px) {
      .toolbar-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>

<body>

  <!-- Navigation Header Component -->
  <kern-header></kern-header>

  <!-- Diagnostics Library Layout -->
  <main class="container section fade-up-element" style="padding-top: var(--space-xl); min-height: 90vh;">
    <!-- Dynamic Navigation Breadcrumbs Component -->
    <kern-breadcrumbs></kern-breadcrumbs>

    <!-- SECTION 1: Editorial Header -->
    <div class="editorial-banner-header" style="border: 1px solid var(--border-color); border-radius: var(--border-radius); overflow: hidden; margin-bottom: var(--space-xl); max-height: 480px; display: flex; align-items: center; justify-content: center; background-color: #FFFFFF;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="blueprintGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="0.75" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF" />
  <rect width="100%" height="100%" fill="url(#blueprintGrid)" />

  <!-- Left Side: Inlined Vector Logo & Typography -->
  <g transform="translate(100, 0)">
    <!-- Official Inlined Logo SVG (Scaled proportionally from original aspect ratio) -->
    <g transform="translate(0, 110) scale(0.32)">
      <!-- Reconstructed Vector Monogram KM -->
  <g fill="#2563EB">
    <!-- Left vertical bar of K -->
    <rect x="100" y="30" width="60" height="300" rx="12" />
    
    <!-- Upper chevron stroke of K -->
    <path d="M 160 180 L 290 50 L 332 92 L 202 222 Z" />
    
    <!-- Lower chevron stroke of K -->
    <path d="M 160 180 L 290 310 L 332 268 L 202 138 Z" />
    
    <!-- M middle chevron -->
    <path d="M 330 310 L 400 180 L 470 310 L 512 268 L 421 98 L 379 98 L 288 268 Z" />
    
    <!-- M right vertical bar -->
    <rect x="470" y="30" width="60" height="300" rx="12" />
  </g>
  
  <!-- Reconstructed Vector Logo Text -->
  <text x="610" y="262" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="240" font-weight="700" fill="#111111" letter-spacing="-0.03em">KernMetric</text>
    </g>

    <!-- Blueprint Category Label -->
    <text x="0" y="240" font-family="'JetBrains Mono', 'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="0.08em">DIAGNOSTIC LIBRARY</text>

    <!-- Large Editorial Serif Heading -->
    <text x="0" y="310" font-family="'Source Serif 4', Georgia, serif" font-size="48" font-weight="600" fill="#111111" letter-spacing="-0.01em">Growth MRI Library</text>

    <!-- Supporting Tagline Subtitle -->
    <text x="0" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#6B7280">Real structural diagnostics from ecommerce businesses.</text>

    <!-- Muted Supporting Descriptor -->
    <text x="0" y="415" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#9CA3AF" max-width="500">Repository of active and resolved constraints.</text>
  </g>

  <!-- Right Side: Connected Diagnostic Reports -->
  <g transform="translate(680, 80)">
    <path d="M 0 0 L 400 0 L 400 400 L 0 400 Z" fill="none" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />
    <path d="M 80 120 L 200 240 L 320 120 M 80 120 L 320 120" fill="none" stroke="#CBD5E1" stroke-width="1.5" opacity="0.4" />
    <line x1="200" y1="240" x2="200" y2="340" stroke="#2563EB" stroke-width="2" opacity="0.5" />
    <g transform="translate(80, 120)">
      <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="0" y="-18" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6B7280" text-anchor="middle">BEAM_MRI</text>
    </g>
    <g transform="translate(320, 120)">
      <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="0" y="-18" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6B7280" text-anchor="middle">THESIS_MRI</text>
    </g>
    <g transform="translate(200, 240)">
      <circle cx="0" cy="0" r="16" fill="#FFFFFF" stroke="#2563EB" stroke-width="3" />
      <circle cx="0" cy="0" r="6" fill="#2563EB" />
      <text x="0" y="-22" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2563EB" font-weight="600" text-anchor="middle">IQBAR_MRI</text>
    </g>
    <g transform="translate(200, 340)">
      <circle cx="0" cy="0" r="10" fill="#CBD5E1" />
      <text x="0" y="20" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">GAINFUL_MRI</text>
    </g>
  </g>
</svg>
      </div>

    <!-- SECTION 2: Horizontal Toolbar -->
    <div class="toolbar-row">
      <!-- Search Input -->
      <div style="position: relative; flex: 1; min-width: 260px;">
        <input type="text" id="lib-search-input" placeholder="Search MRIs..." style="width: 100%; padding: var(--space-xs) var(--space-sm); padding-left: 36px; border: 1px solid var(--border-color); border-radius: var(--border-radius); outline: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); transition: border-color var(--transition-smooth);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="position: absolute; left: 12px; top: 13px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>

      <!-- Sorting Select -->
      <div style="display: flex; align-items: center; gap: var(--space-xxs);">
        <select id="sort-select" style="padding: var(--space-xs) var(--space-sm); border: 1px solid var(--border-color); border-radius: var(--border-radius); background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 0.85rem; outline: none; cursor: pointer; min-width: 130px;">
          <option value="newest">Newest &#9662;</option>
          <option value="confidence">Highest Confidence</option>
          <option value="updated">Recently Updated</option>
          <option value="industry">Industry</option>
        </select>
      </div>

      <!-- View Toggle Buttons -->
      <div style="display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">
        <button class="view-toggle-btn active" data-view="companies" style="background: none; border: none; padding: 0; color: var(--primary); cursor: pointer; font-weight: 600;">Companies</button>
        <span style="color: var(--border-color);">|</span>
        <button class="view-toggle-btn" data-view="paradoxes" style="background: none; border: none; padding: 0; color: var(--text-muted); cursor: pointer;">Constraints</button>
        <span style="color: var(--border-color);">|</span>
        <button class="view-toggle-btn" data-view="industries" style="background: none; border: none; padding: 0; color: var(--text-muted); cursor: pointer;">Industries</button>
      </div>
    </div>

    <!-- SECTION 3: Card Grid -->
    <div class="editorial-grid" id="library-results-grid">
      <!-- Loaded dynamically -->
    </div>

    <!-- SECTION 4: Pagination / Load More -->
    <div style="text-align: center; margin-top: var(--space-lg); margin-bottom: var(--space-xxl);">
      <button id="load-more-btn" class="btn btn-secondary" style="min-height: 48px; min-width: 220px;">Load More Diagnostics</button>
    </div>

  </main>

  <!-- Footer Component -->
  <kern-footer></kern-footer>
