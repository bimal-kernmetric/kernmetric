<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation Experiments — KernMetric</title>
  <meta name="description" content="Dedicated log of e-commerce validation experiments, hypotheses, methods and outcome thresholds.">
  <link rel="stylesheet" href="../styles/main.css">
  <script type="module" src="../components/components.js"></script>
  <script type="module" src="../scripts/main.js"></script>
  <script type="module" src="../scripts/experiments.js"></script>
</head>
<body>

  <!-- Navigation Header Component -->
  <kern-header></kern-header>

  <!-- Main Container -->
  <main class="container-wide section fade-up-element" style="padding-top: var(--space-xl); min-height: 90vh;">
    <!-- Dynamic Navigation Breadcrumbs Component -->
    <kern-breadcrumbs></kern-breadcrumbs>

    <!-- Title Ribbon -->
    <div style="border-bottom: 1px solid var(--border-color); padding-bottom: var(--space-sm); margin-bottom: var(--space-lg);">
      <span class="badge badge-blue">Systems Experimentation Ledger</span>
      <h1 style="margin-top: var(--space-xs); margin-bottom: 4px; font-size: 2.5rem;">Validation Experiments</h1>
      <p style="margin: 0; color: var(--text-secondary);">Relational registry of empirical trials, behavioral tests, elasticity checks, and holdout experiments.</p>
    </div>

    <!-- Toolbar Filters: Status tabs & Search -->
    <div class="flex flex-col md-row justify-between items-center gap-md border-b" style="padding-bottom: var(--space-sm); margin-bottom: var(--space-lg);">
      <!-- Filter Tabs -->
      <div class="km-tabs-list" style="border-bottom: none; padding-bottom: 0;" id="experiment-status-tabs">
        <button class="km-tab-button active" data-status="all">All Trials</button>
        <button class="km-tab-button" data-status="Validated">Validated</button>
        <button class="km-tab-button" data-status="Evidence-backed">Evidence-backed</button>
        <button class="km-tab-button" data-status="Hypothesis">Hypothesis</button>
      </div>

      <!-- Search Input -->
      <div style="position: relative; width: 100%; max-width: 320px;">
        <input type="text" id="experiments-search" class="search-input" placeholder="Search trials or variables..." style="font-size: 0.85rem; padding: 8px 12px; padding-left: 32px; border-radius: var(--border-radius); border: 1px solid var(--border-color); width: 100%;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="position: absolute; left: 10px; top: 12px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
    </div>

    <!-- Active Grid Viewport -->
    <div class="grid grid-cols-2 gap-lg" id="experiments-grid" style="grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));">
      <!-- Generated dynamically by scripts/experiments.js -->
      <div style="grid-column: 1 / -1; padding: var(--space-xl); text-align: center; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;">
        Loading validation trials ledger...
      </div>
    </div>

  </main>

  <!-- Footer Component -->
  <kern-footer></kern-footer>



</body>
</html>
