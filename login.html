<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KernMetric Platform</title>
  <meta name="description" content="Access the KernMetric growth intelligence client portal.">
  <link rel="stylesheet" href="../styles/main.css">
  <script type="module" src="../components/components.js"></script>
  <script type="module" src="../scripts/main.js"></script>
  <style>
    .login-container {
      max-width: 380px;
      margin: 10vh auto;
      padding: var(--space-lg);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      background-color: var(--bg-primary);
    }
    .form-group {
      margin-bottom: var(--space-sm);
    }
    .form-group label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .form-control {
      width: 100%;
      padding: var(--space-xs);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <kern-header></kern-header>

  <main class="container">
    <div class="login-container fade-up-element">
      <div style="text-align: center; margin-bottom: var(--space-md);">
        <div class="logo-dot" style="width: 16px; height: 16px; margin: 0 auto 8px auto; float: none;"></div>
        <h3 style="margin: 0; font-family: 'Source Serif 4', serif; border-bottom: none;">Client Gateway</h3>
        <p class="text-xs" style="color: var(--text-muted); margin-top: 4px;">Enter authorization credentials to unlock diagnostics portal.</p>
      </div>

      <form onsubmit="event.preventDefault(); window.location.href='client.html';">
        <div class="form-group">
          <label for="usr">Organization ID</label>
          <input type="text" id="usr" class="form-control" placeholder="e.g. org_beam" required>
        </div>
        <div class="form-group">
          <label for="pwd">Access Key</label>
          <input type="password" id="pwd" class="form-control" placeholder="••••••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-full" style="margin-top: var(--space-sm);">Authorize Access</button>
      </form>

      <div style="margin-top: var(--space-md); text-align: center;">
        <span class="monospace text-xs" style="color: var(--text-muted);">Demo credentials: <code>org_beam</code> / <code>any</code></span>
      </div>
    </div>
  </main>

  <kern-footer></kern-footer>


</body>
</html>
