<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="blueprintGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="0.75" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF" />
  <rect width="100%" height="100%" fill="url(#blueprintGrid)" />

  <!-- Left Side: Inlined Vector Logo & Typography -->
  <g transform="translate(100, 0)">
    <!-- Official Inlined Logo SVG (Scaled proportionally from original aspect ratio) -->
    <g transform="translate(0, 110) scale(0.32)">
      <!-- Reconstructed Vector Monogram KM -->
  <g fill="#2563EB">
    <!-- Left vertical bar of K -->
    <rect x="100" y="30" width="60" height="300" rx="12" />
    
    <!-- Upper chevron stroke of K -->
    <path d="M 160 180 L 290 50 L 332 92 L 202 222 Z" />
    
    <!-- Lower chevron stroke of K -->
    <path d="M 160 180 L 290 310 L 332 268 L 202 138 Z" />
    
    <!-- M middle chevron -->
    <path d="M 330 310 L 400 180 L 470 310 L 512 268 L 421 98 L 379 98 L 288 268 Z" />
    
    <!-- M right vertical bar -->
    <rect x="470" y="30" width="60" height="300" rx="12" />
  </g>
  
  <!-- Reconstructed Vector Logo Text -->
  <text x="610" y="262" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="240" font-weight="700" fill="#111111" letter-spacing="-0.03em">KernMetric</text>
    </g>

    <!-- Blueprint Category Label -->
    <text x="0" y="240" font-family="'JetBrains Mono', 'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="0.08em">STRUCTURAL FEEDBACK LOOPS</text>

    <!-- Large Editorial Serif Heading -->
    <text x="0" y="310" font-family="'Source Serif 4', Georgia, serif" font-size="48" font-weight="600" fill="#111111" letter-spacing="-0.01em">Structural Paradoxes</text>

    <!-- Supporting Tagline Subtitle -->
    <text x="0" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#6B7280">Hidden constraints that silently limit growth.</text>

    <!-- Muted Supporting Descriptor -->
    <text x="0" y="415" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#9CA3AF" max-width="500">System feedback loops showing counter-intuitive outcomes.</text>
  </g>

  <!-- Right Side: Circular causal loops -->
  <g transform="translate(680, 80)">
    <path d="M 0 0 L 400 0 L 400 400 L 0 400 Z" fill="none" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />
    <circle cx="200" cy="200" r="110" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6" opacity="0.4" />
    <path d="M 200 90 A 110 110 0 0 1 310 200" fill="none" stroke="#2563EB" stroke-width="2.5" opacity="0.6" />
    <path d="M 310 200 A 110 110 0 0 1 200 310" fill="none" stroke="#CBD5E1" stroke-width="1.5" opacity="0.4" />
    <path d="M 200 310 A 110 110 0 0 1 90 200" fill="none" stroke="#CBD5E1" stroke-width="1.5" opacity="0.4" />
    <path d="M 90 200 A 110 110 0 0 1 200 90" fill="none" stroke="#CBD5E1" stroke-width="1.5" opacity="0.4" />
    <g transform="translate(200, 90)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2.5" />
      <text x="0" y="-16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#2563EB" font-weight="600" text-anchor="middle">STIMULUS</text>
    </g>
    <g transform="translate(310, 200)">
      <circle cx="0" cy="0" r="8" fill="#CBD5E1" />
      <text x="16" y="4" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6B7280" text-anchor="start">RESPONSE</text>
    </g>
    <g transform="translate(200, 310)">
      <circle cx="0" cy="0" r="8" fill="#CBD5E1" />
      <text x="0" y="20" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6B7280" text-anchor="middle">CONSEQUENCE</text>
    </g>
    <g transform="translate(90, 200)">
      <circle cx="0" cy="0" r="8" fill="#CBD5E1" />
      <text x="-16" y="4" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6B7280" text-anchor="end">FEEDBACK</text>
    </g>
  </g>
</svg>