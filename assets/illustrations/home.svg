<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="blueprintGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="0.75" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF" />
  <rect width="100%" height="100%" fill="url(#blueprintGrid)" />

  <!-- Left Side: Inlined Vector Logo & Typography -->
  <g transform="translate(100, 0)">
    <!-- Official Inlined Logo SVG (Scaled proportionally from original aspect ratio) -->
    <g transform="translate(0, 110) scale(0.32)">
      <!-- Reconstructed Vector Monogram KM -->
  <g fill="#2563EB">
    <!-- Left vertical bar of K -->
    <rect x="100" y="30" width="60" height="300" rx="12" />
    
    <!-- Upper chevron stroke of K -->
    <path d="M 160 180 L 290 50 L 332 92 L 202 222 Z" />
    
    <!-- Lower chevron stroke of K -->
    <path d="M 160 180 L 290 310 L 332 268 L 202 138 Z" />
    
    <!-- M middle chevron -->
    <path d="M 330 310 L 400 180 L 470 310 L 512 268 L 421 98 L 379 98 L 288 268 Z" />
    
    <!-- M right vertical bar -->
    <rect x="470" y="30" width="60" height="300" rx="12" />
  </g>
  
  <!-- Reconstructed Vector Logo Text -->
  <text x="610" y="262" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="240" font-weight="700" fill="#111111" letter-spacing="-0.03em">KernMetric</text>
    </g>

    <!-- Blueprint Category Label -->
    <text x="0" y="240" font-family="'JetBrains Mono', 'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="0.08em">COMMERCE OPERATING SYSTEM</text>

    <!-- Large Editorial Serif Heading -->
    <text x="0" y="310" font-family="'Source Serif 4', Georgia, serif" font-size="48" font-weight="600" fill="#111111" letter-spacing="-0.01em">Diagnose Before You Deploy</text>

    <!-- Supporting Tagline Subtitle -->
    <text x="0" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#6B7280">Growth Intelligence Operating System</text>

    <!-- Muted Supporting Descriptor -->
    <text x="0" y="415" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#9CA3AF" max-width="500">Complete commerce operating system mapping bottlenecks and constraints.</text>
  </g>

  <!-- Right Side: Systems Diagram -->
  <g transform="translate(680, 80)">
    <path d="M 0 0 L 400 0 L 400 400 L 0 400 Z" fill="none" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />
    <path d="M 50 200 L 150 100 L 250 100 L 350 200" fill="none" stroke="#CBD5E1" stroke-width="2" opacity="0.3" />
    <path d="M 50 200 L 150 300 L 250 300 L 350 200" fill="none" stroke="#CBD5E1" stroke-width="2" opacity="0.3" />
    <path d="M 150 100 L 150 300 M 250 100 L 250 300" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="3" opacity="0.3" />
    <line x1="50" y1="200" x2="350" y2="200" stroke="#CBD5E1" stroke-width="2" opacity="0.2" />
    <g transform="translate(50, 200)">
      <circle cx="0" cy="0" r="16" fill="#FFFFFF" stroke="#2563EB" stroke-width="3" opacity="0.8" />
      <circle cx="0" cy="0" r="6" fill="#2563EB" />
      <text x="0" y="-24" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" font-weight="600" text-anchor="middle">ACQUISITION</text>
    </g>
    <g transform="translate(150, 100)">
      <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" opacity="0.7" />
      <circle cx="0" cy="0" r="4" fill="#CBD5E1" />
      <text x="0" y="-20" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" font-weight="600" text-anchor="middle">CONVERSION</text>
    </g>
    <g transform="translate(250, 100)">
      <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" opacity="0.7" />
      <circle cx="0" cy="0" r="4" fill="#CBD5E1" />
      <text x="0" y="-20" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" font-weight="600" text-anchor="middle">RETENTION</text>
    </g>
    <g transform="translate(350, 200)">
      <circle cx="0" cy="0" r="16" fill="#FFFFFF" stroke="#2563EB" stroke-width="3" opacity="0.8" />
      <circle cx="0" cy="0" r="6" fill="#2563EB" />
      <text x="0" y="-24" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" font-weight="600" text-anchor="middle">MARGIN</text>
    </g>
    <g transform="translate(150, 300)">
      <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" opacity="0.7" />
      <circle cx="0" cy="0" r="4" fill="#CBD5E1" />
      <text x="0" y="24" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" font-weight="600" text-anchor="middle">OPERATIONS</text>
    </g>
    <g transform="translate(250, 300)">
      <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" opacity="0.7" />
      <circle cx="0" cy="0" r="4" fill="#CBD5E1" />
      <text x="0" y="24" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" font-weight="600" text-anchor="middle">PROFITABILITY</text>
    </g>
  </g>
</svg>