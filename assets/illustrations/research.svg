<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="blueprintGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="0.75" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF" />
  <rect width="100%" height="100%" fill="url(#blueprintGrid)" />

  <!-- Left Side: Inlined Vector Logo & Typography -->
  <g transform="translate(100, 0)">
    <!-- Official Inlined Logo SVG (Scaled proportionally from original aspect ratio) -->
    <g transform="translate(0, 110) scale(0.32)">
      <!-- Reconstructed Vector Monogram KM -->
  <g fill="#2563EB">
    <!-- Left vertical bar of K -->
    <rect x="100" y="30" width="60" height="300" rx="12" />
    
    <!-- Upper chevron stroke of K -->
    <path d="M 160 180 L 290 50 L 332 92 L 202 222 Z" />
    
    <!-- Lower chevron stroke of K -->
    <path d="M 160 180 L 290 310 L 332 268 L 202 138 Z" />
    
    <!-- M middle chevron -->
    <path d="M 330 310 L 400 180 L 470 310 L 512 268 L 421 98 L 379 98 L 288 268 Z" />
    
    <!-- M right vertical bar -->
    <rect x="470" y="30" width="60" height="300" rx="12" />
  </g>
  
  <!-- Reconstructed Vector Logo Text -->
  <text x="610" y="262" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="240" font-weight="700" fill="#111111" letter-spacing="-0.03em">KernMetric</text>
    </g>

    <!-- Blueprint Category Label -->
    <text x="0" y="240" font-family="'JetBrains Mono', 'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="0.08em">CITATION NETWORK</text>

    <!-- Large Editorial Serif Heading -->
    <text x="0" y="310" font-family="'Source Serif 4', Georgia, serif" font-size="48" font-weight="600" fill="#111111" letter-spacing="-0.01em">Published Research</text>

    <!-- Supporting Tagline Subtitle -->
    <text x="0" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#6B7280">Evidence-backed diagnostic publications for ecommerce operators.</text>

    <!-- Muted Supporting Descriptor -->
    <text x="0" y="415" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#9CA3AF" max-width="500">Scientific briefs detailing DTC cohort economics, margins, and attribution models.</text>
  </g>

  <!-- Right Side: Citation Network -->
  <g transform="translate(680, 80)">
    <path d="M 0 0 L 400 0 L 400 400 L 0 400 Z" fill="none" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />
    <line x1="80" y1="100" x2="200" y2="150" stroke="#CBD5E1" stroke-width="1" opacity="0.4" />
    <line x1="200" y1="150" x2="300" y2="80" stroke="#CBD5E1" stroke-width="1" opacity="0.4" />
    <line x1="200" y1="150" x2="150" y2="280" stroke="#CBD5E1" stroke-width="1" opacity="0.4" />
    <line x1="150" y1="280" x2="280" y2="300" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="2" opacity="0.6" />
    <line x1="300" y1="80" x2="280" y2="300" stroke="#CBD5E1" stroke-width="1" opacity="0.4" />
    <g transform="translate(80, 100)"><circle cx="0" cy="0" r="6" fill="#CBD5E1" /><text x="0" y="-12" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">BRIEF_01</text></g>
    <g transform="translate(200, 150)"><circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2.5" /><text x="0" y="-16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#2563EB" font-weight="600" text-anchor="middle">PUB_PRIMARY</text></g>
    <g transform="translate(300, 80)"><circle cx="0" cy="0" r="7" fill="#CBD5E1" /><text x="0" y="-12" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">REF_A</text></g>
    <g transform="translate(150, 280)"><circle cx="0" cy="0" r="8" fill="#CBD5E1" /><text x="0" y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">REF_B</text></g>
    <g transform="translate(280, 300)"><circle cx="0" cy="0" r="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" /><text x="0" y="18" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6B7280" text-anchor="middle">BRIEF_02</text></g>
  </g>
</svg>